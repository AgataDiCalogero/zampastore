<section class="stripe-test">
  <button
    type="button"
    class="stripe-test-toggle"
    (click)="open.set(!open())"
    [attr.aria-expanded]="open()"
  >
    <div class="stripe-test-toggle-text">
      <h4>Carte test Stripe</h4>
      <p>Usa questi numeri per simulare casi reali in ambiente test.</p>
    </div>
    <span class="stripe-test-tag">Test</span>
    <i
      class="pi"
      [class.pi-chevron-down]="!open()"
      [class.pi-chevron-up]="open()"
    ></i>
  </button>

  @if (open()) {
  <ul class="stripe-test-list">
    @for (card of cards; track card.number) {
    <li class="stripe-test-row">
      <span class="stripe-row-title">{{ card.title }}</span>
      <code class="stripe-row-number">{{ card.number }}</code>
      <button
        pButton
        type="button"
        class="p-button-text p-button-sm stripe-row-copy"
        icon="pi pi-copy"
        (click)="copyNumber(card.number)"
        [attr.aria-label]="'Copia ' + card.number"
      >
        @if (copied() === card.number) { Copiato! } @else { Copia }
      </button>
    </li>
    }
  </ul>
  }
</section>
