<p-card class="product-card" [header]="product.name">
  <ng-template pTemplate="content">
    <div
      class="product-card-media"
      [class.has-secondary]="secondaryImageLoaded() && !secondaryImageError()"
      (mouseenter)="requestSecondaryImage()"
      (focusin)="requestSecondaryImage()"
      (touchstart)="requestSecondaryImage()"
    >
      @if (mainImage && !imageError()) {
      <img
        [ngSrc]="mainImage"
        [alt]="product.name"
        class="primary-image"
        decoding="async"
        fill
        (error)="handleImageError()"
      />
      @if (shouldRenderSecondary() && secondaryImage && !secondaryImageError()) {
      <img
        [ngSrc]="secondaryImage"
        [alt]="product.name"
        class="secondary-image"
        loading="lazy"
        decoding="async"
        fill
        (load)="handleSecondaryImageLoaded()"
        (error)="handleSecondaryImageError()"
      />
      } } @else {
      <div class="product-image-fallback">
        <i class="pi pi-image"></i>
        <span>{{ product.name }}</span>
      </div>
      }
    </div>
    @if (product.description) {
    <p class="product-card-description">{{ product.description }}</p>
    }
    <p class="product-card-price">
      {{ product.priceCents / 100 | number: '1.2-2' }} €
    </p>
  </ng-template>

  <ng-template pTemplate="footer">
    <div class="product-card-actions">
      <button
        pButton
        type="button"
        class="p-button-secondary product-card-button"
        icon="pi pi-eye"
        label="Dettagli"
        [routerLink]="['/prodotti', product.id]"
        [attr.aria-label]="'Vedi dettagli di ' + product.name"
      ></button>
      <button
        pButton
        type="button"
        class="product-card-button"
        icon="pi pi-shopping-cart"
        label="Aggiungi"
        (click)="handleAddToCart()"
        [attr.aria-label]="'Aggiungi ' + product.name + ' al carrello'"
      ></button>
    </div>
  </ng-template>
</p-card>
